<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retouch — Visual HTML Editor for AI-Generated Code</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%236366f1'/><text x='16' y='22' text-anchor='middle' font-size='20' font-weight='bold' fill='white'>R</text></svg>">
<script src="https://unpkg.com/@tailwindcss/browser@4"></script>
<style>
/* === Reset & Base === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: #09090b; color: #f4f4f5; min-height: 100dvh;
  overflow: hidden;
}

/* === Split Panels === */
.split { display: flex; height: calc(100dvh - 56px); }
.panel { overflow: auto; position: relative; }
.panel-code { width: 35%; background: #18181b; border-right: 1px solid #27272a; }
.panel-preview {
  width: 65%; background: #fafafa;
  transition: width 0.2s ease;
}
.dark .panel-preview { background: #18181b; }
.panel-header {
  padding: 8px 16px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
  background: #27272a; color: #a1a1aa; border-bottom: 1px solid #3f3f46;
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.panel-header .left-group,
.panel-header .right-group {
  display: flex; align-items: center; gap: 6px;
}

/* === Code Editor === */
#codeInput {
  width: 100%; height: calc(100% - 36px); border: none; outline: none; resize: none;
  font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 13px; line-height: 1.6;
  padding: 16px; background: transparent; color: #e4e4e7; tab-size: 2;
}
#codeInput::placeholder { color: #52525b; }

/* === Preview Area === */
#preview {
  width: 100%; min-height: calc(100% - 36px); padding: 32px 48px;
  position: relative; cursor: default;
  transition: max-width 0.25s ease, padding 0.25s ease;
}
#preview * { cursor: pointer; }

/* Preview size modes */
.preview-size-desktop #preview { max-width: 100%; padding: 32px 48px; }
.preview-size-tablet #preview { max-width: 820px; margin: 0 auto; padding: 24px 32px; }
.preview-size-mobile #preview { max-width: 420px; margin: 0 auto; padding: 16px 20px; }

/* Grid overlay */
#gridOverlay {
  display: none;
  position: absolute; inset: 0; z-index: 5;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(99,102,241,0.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(99,102,241,0.08) 1px, transparent 1px);
  background-size: 20px 20px;
}
#gridOverlay.show { display: block; }
.dark #gridOverlay {
  background-image:
    linear-gradient(rgba(99,102,241,0.12) 1px, transparent 1px),
    linear-gradient(90deg, rgba(99,102,241,0.12) 1px, transparent 1px);
}

/* === Selected Element Highlight === */
#preview .retouch-selected {
  outline: 2px solid #6366f1 !important;
  outline-offset: 2px !important;
  position: relative;
}

/* === Inline Editing === */
#preview .retouch-editing {
  outline: 2px solid #22d3ee !important;
  outline-offset: 1px !important;
  cursor: text !important;
  user-select: text !important;
}

/* === Drag & Drop Indicator === */
.drag-handle {
  display: none;
  width: 6px; height: 6px;
  background: #a1a1aa; border: 1px solid #6366f1;
  border-radius: 50%;
  position: absolute; top: -4px; right: -4px;
  cursor: grab; z-index: 20;
  box-shadow: 0 0 0 2px rgba(99,102,241,0.3);
  transition: transform 0.12s, background 0.12s;
}
.drag-handle:hover {
  transform: scale(1.4);
  background: #6366f1;
}
.drag-handle.active {
  cursor: grabbing;
  transform: scale(1.6);
  background: #6366f1;
  box-shadow: 0 0 0 4px rgba(99,102,241,0.4);
}
.retouch-selected > .drag-handle { display: block; }

.drop-indicator {
  height: 3px;
  background: #6366f1;
  border-radius: 2px;
  box-shadow: 0 0 8px rgba(99,102,241,0.6);
  pointer-events: none;
  position: absolute;
  left: 0; right: 0;
  z-index: 15;
  transition: opacity 0.08s;
  opacity: 0;
}
.drop-indicator.show { opacity: 1; }

.dragging-source {
  opacity: 0.3 !important;
  outline: 2px dashed #6366f1 !important;
  outline-offset: 2px !important;
}

/* === Image URL Popover === */
.image-url-popover {
  display: none; position: fixed; z-index: 9999;
  background: #18181b; border: 1px solid #3f3f46; border-radius: 10px;
  padding: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  flex-direction: column; gap: 8px; min-width: 320px;
}
.image-url-popover.show { display: flex; }
.image-url-popover label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: #a1a1aa; }
.image-url-popover input[type="url"] {
  width: 100%; padding: 8px 12px; border: 1px solid #3f3f46; border-radius: 6px;
  background: #27272a; color: #e4e4e7; font-size: 13px; outline: none;
}
.image-url-popover input[type="url"]:focus { border-color: #6366f1; }
.image-url-popover .popover-actions {
  display: flex; gap: 6px; justify-content: flex-end;
}
.image-url-popover .popover-actions button {
  padding: 6px 14px; border: none; border-radius: 6px;
  font-size: 12px; font-weight: 500; cursor: pointer;
}
.image-url-popover .popover-actions .btn-apply {
  background: #6366f1; color: white;
}
.image-url-popover .popover-actions .btn-apply:hover { background: #5558e6; }
.image-url-popover .popover-actions .btn-cancel {
  background: #27272a; color: #d4d4d8;
}
.image-url-popover .popover-actions .btn-cancel:hover { background: #3f3f46; }

/* === Floating Toolbar === */
#toolbar {
  display: none; position: fixed; z-index: 9999;
  background: #18181b; border: 1px solid #3f3f46; border-radius: 10px;
  padding: 6px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  align-items: center; gap: 2px; backdrop-filter: blur(12px);
  flex-wrap: wrap; max-width: min(620px, calc(100vw - 24px));
}
#toolbar.show { display: flex; }
#toolbar .sep { width: 1px; height: 24px; background: #3f3f46; margin: 0 4px; flex-shrink: 0; }
#toolbar button {
  width: 32px; height: 32px; border: none; border-radius: 6px;
  background: transparent; color: #d4d4d8; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all 0.12s; flex-shrink: 0;
}
#toolbar button:hover { background: #27272a; color: #f4f4f5; }
#toolbar button:active { background: #3f3f46; transform: scale(0.95); }
#toolbar button.active { background: #6366f1 !important; color: white !important; }
#toolbar .toolbar-text { font-size: 10px; color: #71717a; padding: 0 6px; white-space: nowrap; }
#toolbar .color-input { width: 28px; height: 28px; padding: 2px; border: none; border-radius: 6px; cursor: pointer; background: transparent; flex-shrink: 0; }
#toolbar .color-input::-webkit-color-swatch-wrapper { padding: 0; }
#toolbar .color-input::-webkit-color-swatch { border: 1px solid #3f3f46; border-radius: 4px; }
#toolbar select {
  height: 28px; border: none; border-radius: 6px; background: #27272a;
  color: #d4d4d8; font-size: 11px; padding: 0 6px; cursor: pointer;
  outline: none; max-width: 110px;
}
#toolbar select:hover { background: #3f3f46; }
#toolbar .move-btn { font-size: 16px; width: 28px; height: 28px; }

/* === Add Element Dropdown === */
.add-menu {
  display: none; position: fixed; z-index: 10000;
  background: #18181b; border: 1px solid #3f3f46; border-radius: 10px;
  padding: 4px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  flex-direction: column; gap: 2px;
}
.add-menu.show { display: flex; }
.add-menu button {
  padding: 6px 16px; border: none; border-radius: 6px;
  background: transparent; color: #d4d4d8; cursor: pointer;
  font-size: 12px; text-align: left; white-space: nowrap;
  transition: all 0.12s;
}
.add-menu button:hover { background: #27272a; color: #f4f4f5; }

/* === Status & Messages === */
#emptyState {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  text-align: center; color: #a1a1aa; pointer-events: none;
}
#emptyState svg { width: 48px; height: 48px; margin: 0 auto 12px; opacity: 0.3; }
#emptyState h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; color: #d4d4d8; }
#emptyState p { font-size: 13px; max-width: 280px; line-height: 1.5; }
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #18181b; border: 1px solid #3f3f46; border-radius: 8px;
  padding: 8px 20px; font-size: 13px; color: #d4d4d8;
  opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 99999;
}
#toast.show { opacity: 1; }

/* === Nav === */
nav {
  display: flex; align-items: center; justify-content: space-between;
  height: 56px; padding: 0 20px; border-bottom: 1px solid #27272a;
  background: #09090b;
}
nav .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; letter-spacing: -0.03em; }
nav .logo svg { width: 28px; height: 28px; }
nav .logo span { background: linear-gradient(135deg,#818cf8,#a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
nav .actions { display: flex; align-items: center; gap: 8px; }
nav .actions button, nav .actions label {
  padding: 6px 14px; border: 1px solid #3f3f46; border-radius: 8px;
  font-size: 13px; font-weight: 500; cursor: pointer; background: #18181b;
  color: #d4d4d8; transition: all 0.12s; display: flex; align-items: center; gap: 6px;
  white-space: nowrap;
}
nav .actions button:hover, nav .actions label:hover { background: #27272a; border-color: #52525b; }
nav .actions .primary { background: #6366f1; border-color: #6366f1; color: white; }
nav .actions .primary:hover { background: #5558e6; }
nav .actions input[type=file] { display: none; }
nav .actions .undo-redo {
  padding: 6px 8px; border: 1px solid #3f3f46; border-radius: 8px;
  background: #18181b; color: #d4d4d8; cursor: pointer; transition: all 0.12s;
  display: flex; align-items: center; gap: 4px; font-size: 12px;
}
nav .actions .undo-redo:hover { background: #27272a; }
nav .actions .undo-redo:disabled { opacity: 0.35; cursor: not-allowed; }
nav .actions .undo-redo:hover:disabled { background: #18181b; }
nav .undo-group { display: flex; gap: 2px; }

/* === Resize Handle === */
.resize-handle {
  width: 4px; cursor: col-resize; background: transparent;
  position: absolute; top: 0; bottom: 0; left: 35%; z-index: 10;
  transition: background 0.15s;
}
.resize-handle:hover, .resize-handle.active { background: #6366f1; }

/* === Responsive === */
@media (max-width: 768px) {
  .split { flex-direction: column; height: auto; }
  .panel-code { width: 100% !important; height: 50dvh; border-right: none; border-bottom: 1px solid #27272a; }
  .panel-preview { width: 100% !important; height: 50dvh; }
  .panel { flex: none !important; }
  .resize-handle { display: none; }
  #preview { padding: 16px; }
  #toolbar { max-width: calc(100vw - 16px); }
}

/* === Scrollbar === */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #52525b; }
.panel-preview::-webkit-scrollbar { width: 8px; }
.panel-preview::-webkit-scrollbar-track { background: transparent; }
.panel-preview::-webkit-scrollbar-thumb { background: #d4d4d4; border-radius: 4px; }
.panel-preview::-webkit-scrollbar-thumb:hover { background: #a1a1aa; }
.dark .panel-preview::-webkit-scrollbar-thumb { background: #3f3f46; }
.dark .panel-preview::-webkit-scrollbar-thumb:hover { background: #52525b; }
</style>
</head>
<body>

<!-- Nav -->
<nav>
  <div class="logo">
    <svg viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="7" fill="#6366f1"/><path d="M8 10h12M8 14h8M8 18h12" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg>
    <div><span>Retouch</span><span style="font-weight:400;color:#71717a;font-size:13px;margin-left:6px">v4</span></div>
  </div>
  <div class="actions">
    <div class="undo-group">
      <button class="undo-redo" id="undoBtn" onclick="undo()" disabled title="Undo (Ctrl+Z)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg></button>
      <button class="undo-redo" id="redoBtn" onclick="redo()" disabled title="Redo (Ctrl+Shift+Z)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
    </div>
    <label for="fileUpload">Open</label>
    <input type="file" id="fileUpload" accept=".html,.htm">
    <button onclick="exportHTML()">Export</button>
  </div>
</nav>

<!-- Split Panels -->
<div class="split">
  <!-- Code Panel -->
  <div class="panel panel-code" id="codePanel">
    <div class="panel-header">HTML Code <span style="font-weight:400;font-size:10px;text-transform:none;letter-spacing:0;color:#71717a">paste from ChatGPT / Claude / v0</span></div>
    <textarea id="codeInput" placeholder='Paste your HTML here, then click "Render"&#10;&#10;Example:&#10;&lt;div style="text-align:center;padding:60px 20px"&gt;&#10;  &lt;h1&gt;Hello World&lt;/h1&gt;&#10;  &lt;p&gt;This is my page&lt;/p&gt;&#10;&lt;/div&gt;'></textarea>
  </div>

  <!-- Resize Handle -->
  <div class="resize-handle" id="resizeHandle"></div>

  <!-- Preview Panel -->
  <div class="panel panel-preview" id="previewPanel">
    <div class="panel-header">
      <div class="left-group">
        Visual Preview
        <div class="sep" style="width:1px;height:16px;background:#3f3f46;margin:0 8px"></div>
        <!-- Preview size buttons -->
        <button onclick="setPreviewSize('desktop')" id="sizeDesktop" class="size-btn active" title="Desktop view" style="padding:3px 8px;border:none;border-radius:4px;background:#6366f1;color:white;font-size:10px;cursor:pointer;font-weight:500">D</button>
        <button onclick="setPreviewSize('tablet')" id="sizeTablet" class="size-btn" title="Tablet view" style="padding:3px 8px;border:none;border-radius:4px;background:#27272a;color:#a1a1aa;font-size:10px;cursor:pointer;font-weight:500">T</button>
        <button onclick="setPreviewSize('mobile')" id="sizeMobile" class="size-btn" title="Mobile view" style="padding:3px 8px;border:none;border-radius:4px;background:#27272a;color:#a1a1aa;font-size:10px;cursor:pointer;font-weight:500">M</button>
        <div class="sep" style="width:1px;height:16px;background:#3f3f46;margin:0 8px"></div>
        <button onclick="toggleGrid()" id="gridToggle" title="Toggle grid overlay" style="padding:3px 8px;border:none;border-radius:4px;background:#27272a;color:#a1a1aa;font-size:10px;cursor:pointer;font-weight:500">Grid</button>
      </div>
      <div class="right-group">
        <button onclick="render()" class="primary" style="padding:4px 12px;border:none;border-radius:6px;background:#6366f1;color:white;font-size:12px;font-weight:500;cursor:pointer">Render</button>
      </div>
    </div>
    <div id="previewContainer" style="position:relative;height:calc(100% - 36px);overflow:auto">
      <div id="gridOverlay"></div>
      <div id="preview">
        <div id="emptyState">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
          <h3>No content yet</h3>
          <p>Paste HTML on the left panel and click Render to edit visually</p>
        </div>
      </div>
      <!-- Drop indicator for drag & drop -->
      <div class="drop-indicator" id="dropIndicator"></div>
    </div>
  </div>
</div>

<!-- Floating Toolbar -->
<div id="toolbar">
  <!-- Row 1: Bold, Italic, Underline -->
  <button onclick="execEdit('bold')" title="Bold (Ctrl+B)"><strong>B</strong></button>
  <button onclick="execEdit('italic')" title="Italic (Ctrl+I)"><em>I</em></button>
  <button onclick="execEdit('underline')" title="Underline (Ctrl+U)"><span style="text-decoration:underline">U</span></button>
  <div class="sep"></div>

  <!-- Font size -->
  <button onclick="execEdit('decreaseFont')" title="Smaller">A-</button>
  <button onclick="execEdit('increaseFont')" title="Larger">A+</button>
  <div class="sep"></div>

  <!-- Font family -->
  <select id="fontFamilySelect" onchange="execEdit('fontFamily',this.value)" title="Font Family">
    <option value="">Font</option>
    <option value="Inter, system-ui, sans-serif">Inter</option>
    <option value="Georgia, serif">Georgia</option>
    <option value="'Times New Roman', serif">Times New Roman</option>
    <option value="'Courier New', monospace">Courier New</option>
    <option value="Arial, sans-serif">Arial</option>
    <option value="'Segoe UI', system-ui, sans-serif">Segoe UI</option>
    <option value="'Trebuchet MS', sans-serif">Trebuchet MS</option>
    <option value="Verdana, sans-serif">Verdana</option>
    <option value="'Garamond', serif">Garamond</option>
    <option value="'Helvetica Neue', sans-serif">Helvetica Neue</option>
  </select>
  <div class="sep"></div>

  <!-- Alignment -->
  <button onclick="execEdit('alignLeft')" title="Align Left" style="font-size:12px">L≡</button>
  <button onclick="execEdit('alignCenter')" title="Align Center" style="font-size:12px">C≡</button>
  <button onclick="execEdit('alignRight')" title="Align Right" style="font-size:12px">R≡</button>
  <div class="sep"></div>

  <!-- Colors -->
  <label title="Text Color" style="display:flex;align-items:center;cursor:pointer">
    <input type="color" class="color-input" id="textColorPicker" value="#ffffff" onchange="execEdit('textColor',this.value)" style="width:28px;height:28px">
  </label>
  <label title="Background Color" style="display:flex;align-items:center;cursor:pointer">
    <input type="color" class="color-input" id="bgColorPicker" value="#6366f1" onchange="execEdit('bgColor',this.value)" style="width:28px;height:28px">
  </label>
  <div class="sep"></div>

  <!-- Padding -->
  <button onclick="execEdit('paddingSmall')" title="Padding: Small" style="font-size:10px">Pd-S</button>
  <button onclick="execEdit('paddingMedium')" title="Padding: Medium" style="font-size:10px">Pd-M</button>
  <button onclick="execEdit('paddingLarge')" title="Padding: Large" style="font-size:10px">Pd-L</button>
  <div class="sep"></div>

  <!-- NEW: Margin controls -->
  <button onclick="execEdit('marginNone')" title="Margin: None" style="font-size:10px">Mg-0</button>
  <button onclick="execEdit('marginSmall')" title="Margin: Small" style="font-size:10px">Mg-S</button>
  <button onclick="execEdit('marginMedium')" title="Margin: Medium" style="font-size:10px">Mg-M</button>
  <button onclick="execEdit('marginLarge')" title="Margin: Large" style="font-size:10px">Mg-L</button>
  <div class="sep"></div>

  <!-- NEW: Width presets -->
  <button onclick="execEdit('widthFull')" title="Width: Full" style="font-size:10px">W-F</button>
  <button onclick="execEdit('widthContained')" title="Width: Contained (max-w)" style="font-size:10px">W-C</button>
  <button onclick="execEdit('widthHalf')" title="Width: Half" style="font-size:10px">W-H</button>
  <button onclick="execEdit('widthAuto')" title="Width: Auto" style="font-size:10px">W-A</button>
  <div class="sep"></div>

  <!-- Move up/down + Add + Duplicate + Delete -->
  <button onclick="execEdit('moveUp')" title="Move Up" class="move-btn">&uarr;</button>
  <button onclick="execEdit('moveDown')" title="Move Down" class="move-btn">&darr;</button>
  <div class="sep"></div>
  <button onclick="toggleAddMenu()" title="Add Element" style="font-size:16px;font-weight:bold;background:#27272a">+</button>
  <button onclick="execEdit('duplicate')" title="Duplicate" style="font-size:13px">&#x2398;</button>
  <button onclick="execEdit('delete')" title="Delete" style="color:#f87171">&#x2715;</button>
</div>

<!-- Add Element Menu -->
<div class="add-menu" id="addMenu">
  <button onclick="addElement('div')">Add &lt;div&gt;</button>
  <button onclick="addElement('h1')">Add &lt;h1&gt; Heading</button>
  <button onclick="addElement('h2')">Add &lt;h2&gt; Heading</button>
  <button onclick="addElement('p')">Add &lt;p&gt; Paragraph</button>
  <button onclick="addElement('img')">Add &lt;img&gt; Image</button>
  <button onclick="addElement('a')">Add &lt;a&gt; Link</button>
  <button onclick="addElement('button')">Add &lt;button&gt;</button>
</div>

<!-- Image URL Popover -->
<div class="image-url-popover" id="imageUrlPopover">
  <label>Image URL</label>
  <input type="url" id="imageUrlInput" placeholder="https://example.com/image.jpg">
  <div class="popover-actions">
    <button class="btn-cancel" onclick="closeImagePopover()">Cancel</button>
    <button class="btn-apply" onclick="applyImageUrl()">Apply</button>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ========================
// === STATE
// ========================
let currentCode = '';
let selectedElement = null;
let isResizing = false;
let isInlineEditing = false;
let gridVisible = false;
let previewSize = 'desktop';
let imageEditTarget = null;

const FONT_SIZE_MIN = 8;
const FONT_SIZE_MAX = 72;
const FONT_SIZE_STEP = 2;

// ========================
// === DRAG & DROP STATE
// ========================
let dragState = { active: false, element: null, handle: null, startY: 0, clone: null };

// ========================
// === HISTORY (Undo/Redo)
// ========================
const MAX_HISTORY = 50;
let historyStack = [];
let historyIndex = -1;

function pushHistory() {
  const preview = document.getElementById('preview');
  const empty = document.getElementById('emptyState');
  if (empty) return;
  preview.querySelectorAll('.retouch-selected').forEach(el => el.classList.remove('retouch-selected'));
  preview.querySelectorAll('.drag-handle').forEach(el => el.remove());
  const state = preview.innerHTML;
  if (historyIndex < historyStack.length - 1) {
    historyStack = historyStack.slice(0, historyIndex + 1);
  }
  historyStack.push(state);
  if (historyStack.length > MAX_HISTORY) historyStack.shift();
  historyIndex = historyStack.length - 1;
  updateUndoButtons();
}

function applyHistoryState(state) {
  const preview = document.getElementById('preview');
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();
  clearSelection();
  preview.innerHTML = state;
  attachClickHandlers(preview);
  attachDragHandles(preview);
  syncCode();
  updateUndoButtons();
}

function undo() {
  if (historyIndex <= 0) return;
  historyIndex--;
  applyHistoryState(historyStack[historyIndex]);
}

function redo() {
  if (historyIndex >= historyStack.length - 1) return;
  historyIndex++;
  applyHistoryState(historyStack[historyIndex]);
}

function updateUndoButtons() {
  document.getElementById('undoBtn').disabled = historyIndex <= 0;
  document.getElementById('redoBtn').disabled = historyIndex >= historyStack.length - 1;
}

// ========================
// === RENDER
// ========================
function render() {
  const code = document.getElementById('codeInput').value.trim();
  if (!code) { showToast('Paste some HTML first'); return; }

  const preview = document.getElementById('preview');
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();

  clearSelection();
  closeImagePopover();

  preview.innerHTML = code;
  attachClickHandlers(preview);
  attachDragHandles(preview);

  preview.addEventListener('click', function(e) {
    if (e.target === this) clearSelection();
  });

  currentCode = preview.innerHTML;
  historyStack = [currentCode];
  historyIndex = 0;
  updateUndoButtons();
  showToast('Rendered! Click any element to edit');
}

function attachClickHandlers(container) {
  container.querySelectorAll('*').forEach(el => {
    el.addEventListener('click', function(e) {
      if (isInlineEditing) return;
      e.stopPropagation();
      selectElement(this);
    });
    el.addEventListener('dblclick', function(e) {
      e.stopPropagation();
      if (this.tagName === 'IMG') {
        openImageEditor(this);
      } else {
        startInlineEdit(this);
      }
    });
  });
}

// ========================
// === DRAG & DROP
// ========================
function attachDragHandles(container) {
  container.querySelectorAll('*').forEach(el => {
    if (el.id === 'emptyState' || el.tagName === 'BODY' || el.tagName === 'HTML') return;
    if (el.closest && el.closest('#emptyState')) return;

    // Remove existing handles
    const existing = el.querySelector(':scope > .drag-handle');
    if (existing) existing.remove();

    const handle = document.createElement('div');
    handle.className = 'drag-handle';
    handle.title = 'Drag to reorder';
    el.style.position = (el.style.position || '').startsWith('s') || !el.style.position ? (window.getComputedStyle(el).position === 'static' ? 'relative' : el.style.position) : el.style.position;

    handle.addEventListener('mousedown', function(e) {
      e.stopPropagation();
      e.preventDefault();
      startDrag(el, e);
    });

    el.appendChild(handle);
  });
}

function startDrag(el, e) {
  if (isInlineEditing) return;
  clearSelection();

  dragState.active = true;
  dragState.element = el;
  dragState.startY = e.clientY;

  el.classList.add('dragging-source');
  handle.classList.add('active');

  document.body.style.cursor = 'grabbing';
  document.body.style.userSelect = 'none';

  showToast('Drag to reorder');
}

document.addEventListener('mousemove', function(e) {
  if (!dragState.active || !dragState.element) return;

  const indicator = document.getElementById('dropIndicator');
  const previewContainer = document.getElementById('previewContainer');
  const rect = previewContainer.getBoundingClientRect();
  const y = e.clientY - rect.top + previewContainer.scrollTop;

  // Find all valid drop targets inside preview (direct children of preview that are block-level)
  const preview = document.getElementById('preview');
  const children = Array.from(preview.children).filter(child =>
    child !== dragState.element &&
    child.id !== 'emptyState' &&
    child.id !== 'gridOverlay' &&
    !child.classList.contains('drop-indicator')
  );

  let bestTarget = null;
  let bestPosition = null; // 'before' or 'after'
  let bestY = 0;

  children.forEach(child => {
    const cr = child.getBoundingClientRect();
    const childY = cr.top - rect.top + previewContainer.scrollTop;
    const childH = cr.height;
    const mid = childY + childH / 2;
    const mouseChildY = e.clientY - rect.top + previewContainer.scrollTop;

    if (mouseChildY >= childY && mouseChildY <= childY + childH) {
      // Inside this child - decide before/after based on mouse position relative to middle
      const relativeY = mouseChildY - childY;
      if (relativeY < childH * 0.4) {
        bestTarget = child;
        bestPosition = 'before';
        bestY = childY;
      } else if (relativeY > childH * 0.6) {
        bestTarget = child;
        bestPosition = 'after';
        bestY = childY + childH;
      } else {
        // Middle of element - don't show indicator
        bestTarget = null;
        bestPosition = null;
      }
    }
  });

  // If not inside any child, determine position relative to all children
  if (!bestTarget) {
    const allChildren = children;
    if (allChildren.length === 0) {
      indicator.classList.remove('show');
      return;
    }
    const firstChildTop = allChildren[0].getBoundingClientRect().top - rect.top + previewContainer.scrollTop;
    const lastChildBottom = allChildren[allChildren.length - 1].getBoundingClientRect().bottom - rect.top + previewContainer.scrollTop;

    if (y < firstChildTop) {
      bestTarget = allChildren[0];
      bestPosition = 'before';
      bestY = firstChildTop;
    } else if (y > lastChildBottom) {
      bestTarget = allChildren[allChildren.length - 1];
      bestPosition = 'after';
      bestY = lastChildBottom;
    }
  }

  if (bestTarget && bestPosition) {
    const previewRect = preview.getBoundingClientRect();
    const indicatorRect = indicator.getBoundingClientRect();
    indicator.style.top = (bestY - 2) + 'px';
    indicator.classList.add('show');
    dragState.dropTarget = bestTarget;
    dragState.dropPosition = bestPosition;
  } else {
    indicator.classList.remove('show');
    dragState.dropTarget = null;
    dragState.dropPosition = null;
  }
});

document.addEventListener('mouseup', function(e) {
  if (!dragState.active) return;

  const indicator = document.getElementById('dropIndicator');
  indicator.classList.remove('show');

  document.body.style.cursor = '';
  document.body.style.userSelect = '';

  if (dragState.element) {
    dragState.element.classList.remove('dragging-source');
  }

  if (dragState.dropTarget && dragState.element && dragState.dropTarget !== dragState.element) {
    const parent = dragState.dropTarget.parentNode;
    if (parent === dragState.element.parentNode) {
      if (dragState.dropPosition === 'before') {
        parent.insertBefore(dragState.element, dragState.dropTarget);
      } else {
        parent.insertBefore(dragState.element, dragState.dropTarget.nextSibling);
      }
      pushHistory();
      syncCode();
      selectElement(dragState.element);
      showToast('Element moved');
    }
  }

  dragState.active = false;
  dragState.element = null;
  dragState.dropTarget = null;
  dragState.dropPosition = null;
});

// ========================
// === INLINE TEXT EDITING
// ========================
function startInlineEdit(el) {
  if (el.tagName === 'IMG' || el.tagName === 'BR' || el.tagName === 'HR') return;

  clearSelection();
  isInlineEditing = true;
  el.classList.add('retouch-editing');
  el.contentEditable = 'true';
  el.focus();

  const range = document.createRange();
  range.selectNodeContents(el);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);

  const finish = () => {
    el.contentEditable = 'false';
    el.classList.remove('retouch-editing');
    isInlineEditing = false;
    pushHistory();
    syncCode();
  };

  el.addEventListener('blur', function handler() {
    el.removeEventListener('blur', handler);
    finish();
  }, { once: true });

  el.addEventListener('keydown', function handler(e) {
    if (e.key === 'Escape' || (e.key === 'Enter' && !e.shiftKey)) {
      e.preventDefault();
      el.blur();
    }
  });
}

function applyImageUrl() {

}

function closeImagePopover() {
  document.getElementById('imageUrlPopover').classList.remove('show');

// ========================
// === SELECTION
// ========================
function selectElement(el) {
  clearSelection();
  selectedElement = el;
  el.classList.add('retouch-selected');

  // Show drag handle on selected element
  const handle = el.querySelector(':scope > .drag-handle');
  if (handle) {
    handle.style.display = 'block';
    handle.classList.remove('active');
  }

  positionToolbar(el);
  document.getElementById('toolbar').classList.add('show');

  // Update controls to match element
  const cs = getComputedStyle(el);
  document.getElementById('textColorPicker').value = rgbToHex(cs.color) || '#ffffff';
  document.getElementById('bgColorPicker').value = rgbToHex(cs.backgroundColor) || '#6366f1';

  const ff = el.style.fontFamily || '';
  document.getElementById('fontFamilySelect').value = '';
  if (ff) {
    for (let opt of document.getElementById('fontFamilySelect').options) {
      if (opt.value && ff.includes(opt.value.split(',')[0].replace(/['\"]/g, ''))) {
        document.getElementById('fontFamilySelect').value = opt.value;
        break;
      }
    }
  }

  // Show image editor hint for images
  if (el.tagName === 'IMG') {
    showToast('Double-click image to change URL');
  }
}

function clearSelection() {
  if (selectedElement) {
    selectedElement.classList.remove('retouch-selected');
    const handle = selectedElement.querySelector(':scope > .drag-handle');
    if (handle) handle.style.display = '';
    selectedElement = null;
  }
  document.getElementById('toolbar').classList.remove('show');
  document.getElementById('addMenu').classList.remove('show');
}

function positionToolbar(el) {
  const tb = document.getElementById('toolbar');
  const rect = el.getBoundingClientRect();

  tb.style.visibility = 'hidden';
  tb.classList.add('show');
  const tbWidth = tb.offsetWidth || 480;
  const tbHeight = tb.offsetHeight || 44;
  tb.classList.remove('show');
  tb.style.visibility = '';

  let left = rect.left + (rect.width / 2) - (tbWidth / 2);
  let top = rect.top - tbHeight - 8;

  const pad = 8;
  if (left < pad) left = pad;
  if (left + tbWidth > window.innerWidth - pad) left = Math.max(pad, window.innerWidth - tbWidth - pad);
  if (top < pad) top = rect.bottom + 8;

  tb.style.left = left + 'px';
  tb.style.top = top + 'px';
}

// === ADD ELEMENT MENU

function toggleAddMenu() {
  const menu = document.getElementById('addMenu');
  if (menu.classList.contains('show')) {

  menu.style.top = (rect.top - 210) + 'px';

}

function addElement(tag) {

  let html = '';
  switch (tag) {

    case 'h1': html = '<h1 style="font-size:2em;font-weight:700;margin:0.5em 0">New Heading</h1>'; break;
    case 'h2': html = '<h2 style="font-size:1.5em;font-weight:600;margin:0.5em 0">New Subheading</h2>'; break;
    case 'p': html = '<p style="margin:0.5em 0;line-height:1.6">New paragraph text. Double-click to edit.</p>'; break;
    case 'img': html = '<img src="https://picsum.photos/seed/retouch/400/250" style="max-width:100%;border-radius:8px;display:block" alt="Placeholder">'; break;
    case 'a': html = '<a href="#" style="color:#818cf8;text-decoration:underline">New link</a>'; break;
    case 'button': html = '<button style="padding:8px 20px;background:#6366f1;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px">New Button</button>'; break;
  }

    document.getElementById('preview').insertAdjacentHTML('beforeend', html);
  } else {

  }

// ========================
// === EDIT COMMANDS
// ========================
function execEdit(command, value) {
  if (!selectedElement) { showToast('Click an element first'); return; }
  const el = selectedElement;

  switch (command) {
    case 'bold':
      el.style.fontWeight = (el.style.fontWeight === '700' || el.style.fontWeight === 'bold') ? '400' : '700';
      break;

    case 'italic':
      el.style.fontStyle = el.style.fontStyle === 'italic' ? 'normal' : 'italic';
      break;

    case 'underline':
      el.style.textDecoration = el.style.textDecoration === 'underline' ? 'none' : 'underline';
      break;

    case 'increaseFont': {
      const curSize = parseFloat(getComputedStyle(el).fontSize) || 16;
      el.style.fontSize = Math.min(curSize + FONT_SIZE_STEP, FONT_SIZE_MAX) + 'px';
      break;
    }

    case 'decreaseFont': {
      const curSz = parseFloat(getComputedStyle(el).fontSize) || 16;
      el.style.fontSize = Math.max(curSz - FONT_SIZE_STEP, FONT_SIZE_MIN) + 'px';
      break;
    }

    case 'fontFamily':
      if (value) el.style.fontFamily = value;
      break;

    case 'alignLeft':
      el.style.textAlign = 'left';
      break;

    case 'alignCenter':
      el.style.textAlign = 'center';
      break;

    case 'alignRight':
      el.style.textAlign = 'right';
      break;

    case 'textColor':
      el.style.color = value;
      break;

    case 'bgColor':
      el.style.backgroundColor = value;
      break;

    case 'paddingSmall':
      el.style.padding = '8px';
      break;

    case 'paddingMedium':
      el.style.padding = '16px';
      break;

    case 'paddingLarge':
      el.style.padding = '32px';
      break;

    // NEW: Margin presets
    case 'marginNone':
      el.style.margin = '0';
      break;

    case 'marginSmall':
      el.style.margin = '8px';
      break;

    case 'marginMedium':
      el.style.margin = '16px';
      break;

    case 'marginLarge':
      el.style.margin = '32px';
      break;

    // NEW: Width presets
    case 'widthFull':
      el.style.width = '100%';
      if (el.style.maxWidth) el.style.maxWidth = '';
      break;

    case 'widthContained':
      el.style.maxWidth = '800px';
      el.style.marginLeft = 'auto';
      el.style.marginRight = 'auto';
      break;

    case 'widthHalf':
      el.style.width = '50%';
      if (el.style.maxWidth) el.style.maxWidth = '';
      break;

    case 'widthAuto':
      el.style.width = '';
      el.style.maxWidth = '';
      el.style.marginLeft = '';
      el.style.marginRight = '';
      break;

    case 'moveUp':
      if (el.previousElementSibling) {
        el.parentNode.insertBefore(el, el.previousElementSibling);
        positionToolbar(el);
      }
      break;

    case 'moveDown':
      if (el.nextElementSibling) {
        el.parentNode.insertBefore(el.nextElementSibling, el);
        positionToolbar(el);
      }
      break;

    case 'duplicate':
      if (el.parentNode) {
        const clone = el.cloneNode(true);
        clone.querySelectorAll('.drag-handle').forEach(h => h.remove());
        el.parentNode.insertBefore(clone, el.nextSibling);
        attachDragHandles(clone);
        selectElement(clone);
      }
      break;

    case 'delete':
      if (el.parentNode) {
        const next = el.nextElementSibling || el.previousElementSibling;
        el.remove();
        clearSelection();
        if (next) { selectElement(next); }
        pushHistory();
        syncCode();
        return;
      }
      break;
  }

  // Update color pickers after change
  if (selectedElement) {
    const cs = getComputedStyle(selectedElement);
    document.getElementById('textColorPicker').value = rgbToHex(cs.color) || '#ffffff';
    document.getElementById('bgColorPicker').value = rgbToHex(cs.backgroundColor) || '#6366f1';
    positionToolbar(selectedElement);
  }

  pushHistory();
  syncCode();
}

function syncCode() {
  const preview = document.getElementById('preview');
  const empty = document.getElementById('emptyState');
  if (empty) return;
  // Remove drag handles from snapshot
  preview.querySelectorAll('.drag-handle').forEach(h => h.remove());
  currentCode = preview.innerHTML;
  document.getElementById('codeInput').value = currentCode;
  // Re-attach handles
  attachDragHandles(preview);
}

// ========================
// === EXPORT
// ========================
function exportHTML() {
  const preview = document.getElementById('preview');
  const empty = document.getElementById('emptyState');
  if (empty) { showToast('Nothing to export - paste HTML first'); return; }

  preview.querySelectorAll('.retouch-selected').forEach(el => el.classList.remove('retouch-selected'));
  preview.querySelectorAll('.retouch-editing').forEach(el => {
    el.contentEditable = 'false';
    el.classList.remove('retouch-editing');
  });

  closeImagePopover();

  const html = preview.innerHTML;

  // Remove drag-handle elements from export
  const temp = document.createElement('div');
  temp.innerHTML = html;
  temp.querySelectorAll('.drag-handle').forEach(h => h.remove());
  const cleanHtml = temp.innerHTML;

  // Determine if original had full HTML structure
  const fullDoc = '<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n<title>My Page</title>\n</head>\n<body>\n' + cleanHtml + '\n</body>\n</html>';

  const blob = new Blob([fullDoc], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'my-page.html';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  // Re-attach drag handles to preview
  attachDragHandles(preview);

  showToast('Exported! File downloaded');
}

document.getElementById('fileUpload').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const text = ev.target.result;
    const bodyMatch = text.match(/<body[^>]*>([\s\S]*)<\/body>/i);
    const content = bodyMatch ? bodyMatch[1] : text;
    document.getElementById('codeInput').value = content;
    render();
  };
  reader.readAsText(file);
  this.value = '';
});

// === RESIZE PANELS
// ========================
const resizeHandle = document.getElementById('resizeHandle');
const codePanel = document.getElementById('codePanel');

resizeHandle.addEventListener('mousedown', function(e) {
  isResizing = true;
  this.classList.add('active');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
});

document.addEventListener('mousemove', function(e) {
  if (!isResizing) return;
  const pct = (e.clientX / window.innerWidth) * 100;
  const clamped = Math.max(20, Math.min(60, pct));
  codePanel.style.width = clamped + '%';
  resizeHandle.style.left = clamped + '%';
});

document.addEventListener('mouseup', function() {
  if (isResizing) {
    isResizing = false;
    resizeHandle.classList.remove('active');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }
});

// ========================
// === KEYBOARD SHORTCUTS
// ========================
document.addEventListener('keydown', function(e) {
  const ctrl = e.ctrlKey || e.metaKey;

  if (e.key === 'Escape') {
    if (isInlineEditing) { document.activeElement?.blur(); return; }
    closeImagePopover();
    clearSelection();
    return;
  }

  if (ctrl && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); return; }
  if (ctrl && e.key === 'z' && e.shiftKey) { e.preventDefault(); redo(); return; }
  if (ctrl && e.key === 'y') { e.preventDefault(); redo(); return; }
  if (ctrl && e.key === 'Enter') { e.preventDefault(); render(); return; }
  if (ctrl && e.key === 's') { e.preventDefault(); exportHTML(); return; }

  if (selectedElement && !isInlineEditing) {
    if (ctrl && e.key === 'b') { e.preventDefault(); execEdit('bold'); return; }
    if (ctrl && e.key === 'i') { e.preventDefault(); execEdit('italic'); return; }
    if (ctrl && e.key === 'u') { e.preventDefault(); execEdit('underline'); return; }
  }

  // Delete key
  if ((e.key === 'Delete' || e.key === 'Backspace') && selectedElement && !isInlineEditing && !e.target.closest('#codeInput')) {
    e.preventDefault();
    execEdit('delete');
  }
});

let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ========================
// === UTILITY
// ========================
function rgbToHex(rgb) {
  if (!rgb || rgb === 'rgba(0, 0, 0, 0)') return '#ffffff';
  const m = rgb.match(/^rgb\s*\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/i);
  if (!m) return null;
  const r = parseInt(m[1]), g = parseInt(m[2]), b = parseInt(m[3]);
  return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
}

// ========================
// === GLOBAL CLICK HANDLING
// ========================
document.addEventListener('click', function(e) {
  const tb = document.getElementById('toolbar');
  const am = document.getElementById('addMenu');
  const ip = document.getElementById('imageUrlPopover');
  if (tb.classList.contains('show') && !tb.contains(e.target) && !am.contains(e.target) && !ip.contains(e.target)) {
    const preview = document.getElementById('preview');
    if (!preview.contains(e.target)) {
      clearSelection();
    }
  }
  if (am.classList.contains('show') && !am.contains(e.target) && !tb.contains(e.target)) {
    am.classList.remove('show');
  }
  if (ip.classList.contains('show') && !ip.contains(e.target) && !tb.contains(e.target)) {
    closeImagePopover();
  }
});

console.log('Retouch v4 ready - Drag & drop elements, edit images, responsive preview');
</script>
